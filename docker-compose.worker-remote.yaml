services:
  worker-ingestion:
    profiles: ["jobs"]
    build:
      context: .
      dockerfile: apps/worker-ingestion/Dockerfile
    env_file:
      - ./.env.worker-remote
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-m", "worker_ingestion.main"]
    restart: "no"

  worker-ml:
    profiles: ["jobs"]
    build:
      context: .
      dockerfile: apps/worker-ml/Dockerfile
    env_file:
      - ./.env.worker-remote
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-m", "worker_ml.main"]
    restart: "no"
