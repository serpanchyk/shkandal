services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ./.env.example
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/healthz\", timeout=2)'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker-ingestion:
    profiles: ["jobs"]
    build:
      context: .
      dockerfile: apps/worker-ingestion/Dockerfile
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "worker_ingestion.main"]
    restart: "no"

  worker-ml:
    profiles: ["jobs"]
    build:
      context: .
      dockerfile: apps/worker-ml/Dockerfile
    env_file:
      - ./.env.example
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      llm-proxy:
        condition: service_started
    command: ["python", "-m", "worker_ml.main"]
    restart: "no"

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:${BACKEND_PORT:-8000}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./infra/postgres/.env.example
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  llm-proxy:
    image: docker.litellm.ai/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml"]
    env_file:
      - ./.env.example
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-replace-me}"
    ports:
      - "${LITELLM_PROXY_PORT:-4000}:4000"
    volumes:
      - ./infra/litellm/config.yaml.example:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
