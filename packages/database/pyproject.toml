[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shkandal-database"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.17.2",
    "asyncpg>=0.31.0",
    "pydantic-settings>=2.12.0",
    "shkandal-common",
    "sqlalchemy[asyncio]>=2.0.44",
]

[tool.uv.sources]
shkandal-common = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/shkandal_database"]
