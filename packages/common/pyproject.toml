[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shkandal-common"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic-settings>=2.12.0",
    "python-json-logger>=4.0.0",
    "PyYAML>=6.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/shkandal_common"]
