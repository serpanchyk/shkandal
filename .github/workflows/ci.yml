name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check uv lock
        run: uv lock --check

      - name: Install Python dependencies
        run: uv sync --frozen --all-packages

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Pytest
        run: uv run pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: apps/frontend

      - name: Build frontend
        run: npm run build
        working-directory: apps/frontend
