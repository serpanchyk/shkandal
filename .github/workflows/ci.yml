name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shkandal
          POSTGRES_PASSWORD: shkandal_dev_password
          POSTGRES_DB: shkandal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shkandal -d shkandal"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_DATABASE_URL: postgresql://shkandal:shkandal_dev_password@localhost:5432/shkandal
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check uv lock
        run: uv lock --check

      - name: Install Python dependencies
        run: uv sync --frozen --all-packages

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Pytest
        run: uv run pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: apps/frontend