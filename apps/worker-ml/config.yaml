service_name: worker-ml
poll_interval_seconds: 30
enqueue_batch_size: 500
claim_batch_size: 50
worker_concurrency: 4
stale_job_timeout_seconds: 1800
job_max_attempts: 3
case_audit_interval_days: 30
case_audit_enqueue_batch_size: 20
case_audit_card_batch_size: 20
case_audit_automatic_enabled: true
llm_case_public_interest_audit_model: shkandal-case-public-interest-audit
llm_case_duplicate_audit_model: shkandal-case-duplicate-audit
relevance_model_dir: artifacts/models/relevance/tfidf_logistic_noise_assigned
relevance_threshold: 0.5
embedding_model_dir: artifacts/models/embeddings/multilingual_e5_small/model
embedding_vector_size: 384
case_resolution_candidate_limit: 12
entity_resolution_candidate_limit: 8
event_resolution_candidate_limit: 8
